# folders.conf
# One pair per line: origin|destination
# - Lines starting with # are ignored, blank lines ignored
# - origin: local path (your NAS mount)
# - destination: rclone remote path (e.g. pcloud:Backups/Photos)
#
# Examples:
# /mnt/nas/Photos|pcloud:Backups/Photos
# /mnt/nas/Documents/Important|pcloud:Backups/Documents
# /mnt/nas/Videos/Family|pcloud:Backups/Videos/Family

/mnt/nas/Photos|pcloud:Backups/Photos
/mnt/nas/Documents|pcloud:Backups/Documents
